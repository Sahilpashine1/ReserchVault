<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Login - Faculty Publications Management System">
    <title>Admin Login |Faculty Publications System</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Admin-specific styling */
        .admin-login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .admin-login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(50px, 50px);
            }
        }

        .admin-login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            padding: 3rem;
            max-width: 450px;
            width: 90%;
            position: relative;
            z-index: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .admin-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            }

            50% {
                box-shadow: 0 4px 25px rgba(102, 126, 234, 0.6);
            }
        }

        .admin-header h1 {
            font-size: 2rem;
            color: #1a1a2e;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .admin-header p {
            color: #666;
            font-size: 0.95rem;
        }

        .admin-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .admin-form .form-group {
            margin-bottom: 1.5rem;
        }

        .admin-form .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .input-wrapper {
            position: relative;
        }

        .admin-form .form-input {
            width: 100%;
            padding: 0.9rem 3rem 0.9rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: #f8f9fa;
        }

        .admin-form .form-input:hover {
            border-color: #c0c0c0;
            background: #fff;
        }

        .admin-form .form-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .admin-form .form-input:focus+.input-icon {
            color: #667eea;
        }

        .input-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            transition: all 0.3s ease;
            user-select: none;
            font-size: 1.2rem;
        }

        .input-icon:hover {
            color: #667eea;
            transform: translateY(-50%) scale(1.1);
        }

        .admin-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }

        .admin-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .admin-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .admin-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .admin-btn:active {
            transform: translateY(-1px);
        }

        .security-notice {
            background: linear-gradient(135deg, #fff3cd 0%, #ffe8a1 100%);
            border-left: 4px solid #ffc107;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #856404;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .security-notice strong {
            display: block;
            margin-bottom: 0.3rem;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e0e0e0;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .back-link a:hover {
            color: #764ba2;
            transform: translateX(-5px);
        }
    </style>
</head>

<body>
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="admin-header">
                <span class="admin-icon">🔐</span>
                <span class="admin-badge">ADMIN ACCESS</span>
                <h1>Admin Portal</h1>
                <p>Faculty Publications Management System</p>
            </div>

            <div class="security-notice">
                <strong>🛡️ Secure Admin Area</strong>
                This area is restricted to authorized administrators only. All login attempts are logged and monitored.
            </div>

            <div id="adminLoginAlert"></div>

            <form id="adminLoginForm" class="admin-form">
                <div class="form-group">
                    <label class="form-label" for="adminEmail">
                        <span style="margin-right: 0.3rem;">👤</span> Admin Email
                    </label>
                    <div class="input-wrapper">
                        <input type="email" id="adminEmail" class="form-input" placeholder="admin@college.edu" required
                            autocomplete="username">
                        <span class="input-icon">📧</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="adminPassword">
                        <span style="margin-right: 0.3rem;">🔑</span> Password
                    </label>
                    <div class="input-wrapper">
                        <input type="password" id="adminPassword" class="form-input" placeholder="Enter admin password"
                            required autocomplete="current-password">
                        <span class="input-icon" id="togglePassword" onclick="togglePasswordVisibility()">👁️</span>
                    </div>
                </div>

                <button type="submit" class="admin-btn">
                    <span id="adminLoginButtonText">🔓 Access Admin Panel</span>
                    <span id="adminLoginSpinner" class="spinner hidden"></span>
                </button>
            </form>

            <div class="back-link">
                <a href="index.html">← Back to Faculty Login</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // Toggle password visibility
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('adminPassword');
            const toggleIcon = document.getElementById('togglePassword');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }

        // Add input focus effects
        document.querySelectorAll('.form-input').forEach(input => {
            input.addEventListener('focus', function () {
                this.parentElement.parentElement.querySelector('.form-label').style.color = '#667eea';
            });

            input.addEventListener('blur', function () {
                this.parentElement.parentElement.querySelector('.form-label').style.color = '#333';
            });
        });

        // Login form submission
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;

            const buttonText = document.getElementById('adminLoginButtonText');
            const spinner = document.getElementById('adminLoginSpinner');
            const alertArea = document.getElementById('adminLoginAlert');

            // Show loading state
            buttonText.classList.add('hidden');
            spinner.classList.remove('hidden');

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Login failed');
                }

                // Check if user has admin privileges
                if (data.user.role !== 'super_admin' && data.user.role !== 'admin_viewer') {
                    throw new Error('Access Denied. Admin privileges required.');
                }

                // Store authentication data
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                // Show success message
                showAlert('Login successful! Redirecting to admin panel...', 'success');

                // Redirect to admin panel
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showAlert(error.message || 'Login failed. Please try again.', 'error');

                // Reset button
                buttonText.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        });

        function showAlert(message, type = 'info') {
            const alertArea = document.getElementById('adminLoginAlert');
            const alertClass = type === 'success' ? 'alert-success' :
                type === 'error' ? 'alert-error' : 'alert-info';

            alertArea.innerHTML = `<div class="alert ${alertClass}">${message}</div>`;

            setTimeout(() => {
                alertArea.innerHTML = '';
            }, 5000);
        }

        // Check if already logged in as admin
        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');

            if (token && (user.role === 'super_admin' || user.role === 'admin_viewer')) {
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>

</html>
