<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ResearchVault - Admin Login">
    <title>Admin Login | ResearchVault</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="admin-login-page">
        <div class="admin-login-card">

            <!-- Logo -->
            <div style="text-align:center;margin-bottom:1.25rem;">
                <div style="display:flex;align-items:center;justify-content:center;gap:0.55rem;margin-bottom:1rem;">
                    <svg width="34" height="38" viewBox="0 0 40 44" fill="none">
                        <path d="M20 2L4 8.5V20C4 30.2 11.2 39.7 20 42C28.8 39.7 36 30.2 36 20V8.5L20 2Z"
                            fill="#2563eb" />
                        <path d="M13 22L17.5 26.5L27 16" stroke="white" stroke-width="2.5" stroke-linecap="round"
                            stroke-linejoin="round" />
                    </svg>
                    <span style="font-size:1.2rem;font-weight:700;color:var(--text-primary);">Research<span
                            style="font-weight:400;color:var(--blue-600);">Vault</span></span>
                </div>
                <div class="admin-badge-pill">🔐 ADMIN ACCESS</div>
                <h1 style="font-size:1.1rem;font-weight:700;color:var(--text-primary);margin-bottom:0.2rem;">Admin
                    Portal</h1>
                <p style="font-size:0.82rem;color:var(--text-light);">ResearchVault</p>
            </div>

            <div class="security-notice">
                <strong style="display:block;margin-bottom:0.3rem;">🛡️ Secure Admin Area</strong>
                This area is restricted to authorized administrators only. All login attempts are logged and monitored.
            </div>

            <div id="adminLoginAlert"></div>

            <form id="adminLoginForm">
                <div class="login-input-wrapper">
                    <span class="login-input-icon">👤</span>
                    <input type="email" id="adminEmail" class="login-input" placeholder="admin@college.edu" required
                        autocomplete="username">
                </div>
                <div class="login-input-wrapper">
                    <span class="login-input-icon">🔑</span>
                    <input type="password" id="adminPassword" class="login-input" placeholder="Enter admin password"
                        required autocomplete="current-password" style="padding-right:2.5rem;">
                    <span id="togglePassword" onclick="togglePwd()"
                        style="position:absolute;right:0.85rem;top:50%;transform:translateY(-50%);cursor:pointer;font-size:0.9rem;color:var(--text-muted);">👁️</span>
                </div>
                <button type="submit" class="login-btn" style="margin-top:0.5rem;">
                    <span id="adminLoginButtonText">🔓 Access Admin Panel</span>
                    <span id="adminLoginSpinner" class="spinner hidden"></span>
                </button>
            </form>

            <div
                style="text-align:center;margin-top:1.1rem;padding-top:1.1rem;border-top:1px solid var(--border-color);">
                <a href="index.html"
                    style="font-size:0.82rem;color:var(--blue-600);text-decoration:none;font-weight:500;">← Back to
                    ResearchVault Login</a>
            </div>
        </div>

        <!-- Footer -->
        <div class="login-footer">
            <div class="login-footer-logo">
                <svg width="20" height="22" viewBox="0 0 40 44" fill="none">
                    <path d="M20 2L4 8.5V20C4 30.2 11.2 39.7 20 42C28.8 39.7 36 30.2 36 20V8.5L20 2Z" fill="#2563eb"
                        opacity="0.7" />
                    <path d="M13 22L17.5 26.5L27 16" stroke="white" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <span class="login-footer-logo-text">ResearchVault</span>
            </div>
            <div class="login-footer-links">
                <a href="#">Privacy Policy</a> &middot; <a href="#">Terms of Service</a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        const API_URL = window.API_URL || 'http://localhost:3000/api';

        function togglePwd() {
            const inp = document.getElementById('adminPassword');
            const icon = document.getElementById('togglePassword');
            if (inp.type === 'password') { inp.type = 'text'; icon.textContent = '🙈'; }
            else { inp.type = 'password'; icon.textContent = '👁️'; }
        }

        document.querySelectorAll('.login-input').forEach(inp => {
            inp.addEventListener('focus', function () { this.parentElement.querySelector('.login-input-icon').style.color = 'var(--blue-600)'; });
            inp.addEventListener('blur', function () { this.parentElement.querySelector('.login-input-icon').style.color = 'var(--text-muted)'; });
        });

        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const btnText = document.getElementById('adminLoginButtonText');
            const spinner = document.getElementById('adminLoginSpinner');
            btnText.classList.add('hidden'); spinner.classList.remove('hidden');
            try {
                const r = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await r.json();
                if (!r.ok) throw new Error(data.message || 'Login failed');
                if (data.user.role !== 'super_admin' && data.user.role !== 'admin_viewer') {
                    throw new Error('Access Denied. Admin privileges required.');
                }
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => { window.location.href = 'admin.html'; }, 1000);
            } catch (err) {
                showAlert(err.message || 'Login failed. Please try again.', 'error');
                btnText.classList.remove('hidden'); spinner.classList.add('hidden');
            }
        });

        function showAlert(msg, type) {
            const el = document.getElementById('adminLoginAlert');
            const cls = type === 'success' ? 'alert-success' : type === 'error' ? 'alert-error' : 'alert-info';
            el.innerHTML = `<div class="alert ${cls}">${msg}</div>`;
            if (type !== 'success') setTimeout(() => { el.innerHTML = ''; }, 5000);
        }

        window.addEventListener('load', () => {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (token && (user.role === 'super_admin' || user.role === 'admin_viewer')) {
                window.location.href = 'admin.html';
            }
        });
    </script>
</body>

</html>
